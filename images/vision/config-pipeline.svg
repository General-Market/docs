<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 660" width="980" height="660" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1F1F1F"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-opacity="0.03"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="980" height="660" fill="#FFF"/>

  <!-- ==================== TOP SECTION: CONFIG ORCHESTRATION ==================== -->
  <text x="490" y="32" text-anchor="middle" font-size="10" font-weight="600" fill="#0A0A0A" fill-opacity="0.4" letter-spacing="2">CONFIG ORCHESTRATION</text>

  <!-- Card 1: Data Node — 3px emerald left border -->
  <rect x="50" y="52" width="280" height="96" rx="12" fill="#0A0A0A" fill-opacity="0.03" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1" filter="url(#shadow)"/>
  <rect x="50" y="60" width="3" height="72" rx="1.5" fill="#10B981"/>
  <text x="73" y="80" font-size="14" font-weight="600" fill="#0A0A0A">Data Node</text>
  <text x="73" y="100" font-family="'JetBrains Mono', monospace" font-size="10" fill="#0A0A0A" fill-opacity="0.5">GET /batches/recommended</text>
  <text x="73" y="118" font-size="10" fill="#0A0A0A" fill-opacity="0.3">Generates configs per source</text>

  <!-- Curved arrow 1 → 2 -->
  <path d="M330,100 C350,100 360,100 370,100" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1" fill="none"/>
  <polygon points="370,97 378,100 370,103" fill="#0A0A0A" fill-opacity="0.12"/>
  <circle cx="330" cy="100" r="3" fill="#0A0A0A" fill-opacity="0.12"/>

  <!-- Card 2: Config Orchestrator -->
  <rect x="386" y="52" width="280" height="96" rx="12" fill="#0A0A0A" fill-opacity="0.03" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1" filter="url(#shadow)"/>
  <text x="406" y="80" font-size="14" font-weight="600" fill="#0A0A0A">Config Orchestrator</text>
  <text x="406" y="100" font-size="10" fill="#0A0A0A" fill-opacity="0.5">Changed → BLS consensus → updateBatchConfig()</text>
  <text x="406" y="118" font-size="10" fill="#0A0A0A" fill-opacity="0.5">New source → BLS consensus → createBatch()</text>

  <!-- Curved arrow 2 → 3 -->
  <path d="M666,100 C686,100 696,100 706,100" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1" fill="none"/>
  <polygon points="706,97 714,100 706,103" fill="#0A0A0A" fill-opacity="0.12"/>
  <circle cx="666" cy="100" r="3" fill="#0A0A0A" fill-opacity="0.12"/>

  <!-- Card 3: Vision.sol — dark gradient -->
  <rect x="722" y="52" width="208" height="96" rx="12" fill="url(#darkGrad)" filter="url(#shadow)"/>
  <text x="826" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#FFF">Vision.sol</text>
  <text x="826" y="112" text-anchor="middle" font-size="10" fill="#FFF" fill-opacity="0.5">configHash stored on-chain</text>

  <!-- Dashed curved arrow back: Orchestrator → Data Node -->
  <path d="M526,148 C526,172 190,172 190,148" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="5,3" fill="none"/>
  <polygon points="187,152 190,144 193,152" fill="#0A0A0A" fill-opacity="0.12"/>
  <text x="358" y="168" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0A0A0A" fill-opacity="0.25">POST /batches/signed</text>

  <!-- Separator -->
  <line x1="50" y1="200" x2="930" y2="200" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="1"/>

  <!-- ==================== BOTTOM SECTION: ADDING A NEW SOURCE ==================== -->
  <text x="490" y="244" text-anchor="middle" font-size="22" font-weight="700" fill="#0A0A0A" letter-spacing="-0.5">ADDING A NEW SOURCE</text>

  <!-- Step 1 -->
  <circle cx="166" cy="284" r="14" fill="url(#darkGrad)"/>
  <text x="166" y="289" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">1</text>
  <rect x="194" y="270" width="600" height="28" rx="12" fill="#0A0A0A" fill-opacity="0.03" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>
  <text x="214" y="289" font-size="11" fill="#0A0A0A" fill-opacity="0.6">Add source to data-node config</text>
  <line x1="166" y1="298" x2="166" y2="316" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Step 2 -->
  <circle cx="166" cy="330" r="14" fill="url(#darkGrad)"/>
  <text x="166" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">2</text>
  <rect x="194" y="316" width="600" height="28" rx="12" fill="#0A0A0A" fill-opacity="0.03" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>
  <text x="214" y="335" font-size="11" fill="#0A0A0A" fill-opacity="0.6">/batches/recommended returns new source</text>
  <line x1="166" y1="344" x2="166" y2="362" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Step 3 -->
  <circle cx="166" cy="376" r="14" fill="url(#darkGrad)"/>
  <text x="166" y="381" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">3</text>
  <rect x="194" y="362" width="600" height="28" rx="12" fill="#0A0A0A" fill-opacity="0.03" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>
  <text x="214" y="381" font-size="11" fill="#0A0A0A" fill-opacity="0.6">Orchestrator detects: no on-chain batch</text>
  <line x1="166" y1="390" x2="166" y2="408" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Step 4 -->
  <circle cx="166" cy="422" r="14" fill="url(#darkGrad)"/>
  <text x="166" y="427" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">4</text>
  <rect x="194" y="408" width="600" height="28" rx="12" fill="#0A0A0A" fill-opacity="0.03" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>
  <text x="214" y="427" font-size="11" fill="#0A0A0A" fill-opacity="0.6">BLS consensus: createBatchAndJoin()</text>
  <line x1="166" y1="436" x2="166" y2="454" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Step 5 -->
  <circle cx="166" cy="468" r="14" fill="url(#darkGrad)"/>
  <text x="166" y="473" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">5</text>
  <rect x="194" y="454" width="600" height="28" rx="12" fill="#0A0A0A" fill-opacity="0.03" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>
  <text x="214" y="473" font-size="11" fill="#0A0A0A" fill-opacity="0.6">Vision.sol emits BatchCreated event</text>
  <line x1="166" y1="482" x2="166" y2="500" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Step 6 -->
  <circle cx="166" cy="514" r="14" fill="url(#darkGrad)"/>
  <text x="166" y="519" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">6</text>
  <rect x="194" y="500" width="600" height="28" rx="12" fill="#0A0A0A" fill-opacity="0.03" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>
  <text x="214" y="519" font-size="11" fill="#0A0A0A" fill-opacity="0.6">Chain Listener auto-registers batch</text>
  <line x1="166" y1="528" x2="166" y2="546" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Step 7 -->
  <circle cx="166" cy="560" r="14" fill="url(#darkGrad)"/>
  <text x="166" y="565" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">7</text>
  <rect x="194" y="546" width="600" height="28" rx="12" fill="#0A0A0A" fill-opacity="0.03" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>
  <text x="214" y="565" font-size="11" fill="#0A0A0A" fill-opacity="0.6">Signed config pushed to data-node</text>
  <line x1="166" y1="574" x2="166" y2="592" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Step 8 -->
  <circle cx="166" cy="606" r="14" fill="url(#darkGrad)"/>
  <text x="166" y="611" text-anchor="middle" font-size="12" font-weight="700" fill="#FFF">8</text>
  <rect x="194" y="592" width="600" height="28" rx="12" fill="#0A0A0A" fill-opacity="0.03" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>
  <text x="214" y="611" font-size="11" fill="#0A0A0A" fill-opacity="0.6">Frontend polls /batches/signed → batch live</text>

  <!-- Emerald pill -->
  <rect x="380" y="634" width="220" height="28" rx="14" fill="#10B981"/>
  <text x="490" y="653" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">Zero deploys required</text>
</svg>