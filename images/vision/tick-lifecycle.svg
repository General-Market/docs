<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" width="980" height="560" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1F1F1F"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-opacity="0.03"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="980" height="560" fill="white"/>

  <!-- Decorative circles -->
  <circle cx="120" cy="480" r="180" fill="#0A0A0A" opacity="0.02"/>
  <circle cx="860" cy="80" r="160" fill="#0A0A0A" opacity="0.02"/>

  <!-- COLUMN HEADERS — dark gradient strip -->
  <rect x="40" y="32" width="900" height="48" rx="12" fill="url(#darkGrad)"/>
  <!-- Vertical separators -->
  <line x1="340" y1="40" x2="340" y2="72" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="640" y1="40" x2="640" y2="72" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Column labels -->
  <text x="190" y="61" text-anchor="middle" fill="white" font-size="12" font-weight="600" letter-spacing="2">TICK N-1</text>
  <text x="490" y="61" text-anchor="middle" fill="white" font-size="12" font-weight="600" letter-spacing="2">TICK N</text>
  <text x="790" y="61" text-anchor="middle" fill="white" font-size="12" font-weight="600" letter-spacing="2">TICK N+1</text>

  <!-- ROW LABELS column header area -->
  <!-- Row 1: Alice -->
  <text x="56" y="126" fill="#0A0A0A" font-size="13" font-weight="600">Alice</text>
  <!-- Row separator -->
  <line x1="40" y1="158" x2="940" y2="158" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Row 2: Bob -->
  <text x="56" y="198" fill="#0A0A0A" font-size="13" font-weight="600">Bob</text>
  <!-- Row separator -->
  <line x1="40" y1="230" x2="940" y2="230" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Row 3: Carol -->
  <text x="56" y="270" fill="#0A0A0A" font-size="13" font-weight="600">Carol</text>
  <!-- Row separator -->
  <line x1="40" y1="302" x2="940" y2="302" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="1"/>

  <!-- GRID CELLS -->

  <!-- Alice / Tick N-1: Submission -->
  <rect x="120" y="92" width="200" height="52" rx="8" fill="#0A0A0A" fill-opacity="0.015"/>
  <circle cx="138" cy="118" r="3.5" fill="#10B981"/>
  <text x="150" y="113" fill="#0A0A0A" font-size="11" font-weight="600">Submits bitmap</text>
  <text x="150" y="128" fill="#0A0A0A" font-size="10" opacity="0.3">pending for next tick</text>

  <!-- Alice / Tick N: ACTIVE -->
  <rect x="360" y="92" width="260" height="52" rx="8" fill="url(#darkGrad)"/>
  <text x="490" y="114" text-anchor="middle" fill="white" font-size="12" font-weight="700">ACTIVE</text>
  <text x="490" y="130" text-anchor="middle" fill="white" font-size="10" opacity="0.5">resolving</text>

  <!-- Alice / Tick N+1: Empty -->
  <rect x="660" y="92" width="260" height="52" rx="8" fill="#0A0A0A" fill-opacity="0.015"/>

  <!-- Bob / Tick N-1: Empty -->
  <rect x="120" y="164" width="200" height="52" rx="8" fill="#0A0A0A" fill-opacity="0.015"/>

  <!-- Bob / Tick N: Submission -->
  <rect x="360" y="164" width="260" height="52" rx="8" fill="#0A0A0A" fill-opacity="0.015"/>
  <circle cx="378" cy="190" r="3.5" fill="#10B981"/>
  <text x="390" y="185" fill="#0A0A0A" font-size="11" font-weight="600">Submits bitmap</text>
  <text x="390" y="200" fill="#0A0A0A" font-size="10" opacity="0.3">pending for next tick</text>

  <!-- Bob / Tick N+1: ACTIVE -->
  <rect x="660" y="164" width="260" height="52" rx="8" fill="url(#darkGrad)"/>
  <text x="790" y="186" text-anchor="middle" fill="white" font-size="12" font-weight="700">ACTIVE</text>
  <text x="790" y="202" text-anchor="middle" fill="white" font-size="10" opacity="0.5">resolving</text>

  <!-- Carol / Tick N-1: Submission -->
  <rect x="120" y="236" width="200" height="52" rx="8" fill="#0A0A0A" fill-opacity="0.015"/>
  <circle cx="138" cy="262" r="3.5" fill="#10B981"/>
  <text x="150" y="257" fill="#0A0A0A" font-size="11" font-weight="600">Submits bitmap</text>
  <text x="150" y="272" fill="#0A0A0A" font-size="10" opacity="0.3">pending for next tick</text>

  <!-- Carol / Tick N: ACTIVE + sits out -->
  <rect x="360" y="236" width="260" height="52" rx="8" fill="url(#darkGrad)"/>
  <text x="490" y="258" text-anchor="middle" fill="white" font-size="12" font-weight="700">ACTIVE</text>
  <text x="490" y="274" text-anchor="middle" fill="white" font-size="10" opacity="0.5">resolving</text>

  <!-- Carol / Tick N+1: Sits out safely -->
  <rect x="660" y="236" width="260" height="52" rx="8" fill="#0A0A0A" fill-opacity="0.015"/>
  <text x="780" y="260" fill="#0A0A0A" font-size="11" opacity="0.3">Sits out safely</text>
  <!-- Emerald checkmark -->
  <path d="M760,254 l3,3 l6,-6" stroke="#10B981" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="780" y="275" fill="#0A0A0A" font-size="11" opacity="0.25">No submission</text>

  <!-- TICK BOUNDARY — dashed vertical line between N and N+1 -->
  <line x1="640" y1="88" x2="640" y2="310" stroke="#0A0A0A" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- TICK BOUNDARY floating card -->
  <rect x="280" y="330" width="420" height="130" rx="12" fill="#0A0A0A" fill-opacity="0.03" filter="url(#shadow)"/>
  <text x="490" y="358" text-anchor="middle" fill="#0A0A0A" font-size="10" font-weight="600" letter-spacing="2" opacity="0.4">TICK BOUNDARY</text>
  <line x1="310" y1="370" x2="670" y2="370" stroke="#0A0A0A" stroke-opacity="0.06" stroke-width="1"/>
  <text x="310" y="394" fill="#0A0A0A" font-size="11" opacity="0.5">1. Resolve active bitmaps</text>
  <text x="310" y="416" fill="#0A0A0A" font-size="11" opacity="0.5">2. Flip: active ← pending</text>
  <text x="310" y="438" fill="#0A0A0A" font-size="11" opacity="0.5">3. Config promotion</text>

  <!-- FOOTER pill -->
  <rect x="40" y="490" width="900" height="42" rx="14" fill="#0A0A0A" fill-opacity="0.03"/>
  <text x="490" y="516" text-anchor="middle" fill="#0A0A0A" font-size="11" opacity="0.4">Submit during tick N → Active during tick N+1. No submission = sit out safely.</text>
</svg>