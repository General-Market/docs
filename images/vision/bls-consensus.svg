<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1F1F1F"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-opacity="0.03"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="#FFFFFF"/>

  <!-- ===== TOP ROW: 3 Oracle cards ===== -->
  <!-- Centered: 270*3 + 24*2 = 858, start x = (960-858)/2 = 51 -->

  <!-- Oracle 1 -->
  <rect x="51" y="32" width="270" height="200" rx="12" fill="#0A0A0A" opacity="0.03" filter="url(#shadow)"/>
  <!-- Dark gradient header strip -->
  <rect x="51" y="32" width="270" height="40" rx="12" fill="url(#darkGrad)"/>
  <rect x="51" y="56" width="270" height="16" fill="url(#darkGrad)"/>
  <text x="186" y="58" text-anchor="middle" fill="white" font-size="14" font-weight="600">Oracle 1</text>
  <!-- Body -->
  <text x="75" y="100" fill="#0A0A0A" font-size="11" opacity="0.5">1. Fetch prices from DN-1</text>
  <text x="75" y="122" fill="#0A0A0A" font-size="11" opacity="0.5">2. Resolve outcomes</text>
  <text x="75" y="144" fill="#0A0A0A" font-size="11" opacity="0.5">3. BLS sign message</text>
  <!-- Separator -->
  <line x1="67" y1="160" x2="305" y2="160" stroke="#0A0A0A" opacity="0.08" stroke-width="1"/>
  <!-- Signed data -->
  <text x="75" y="180" fill="#0A0A0A" font-size="9" font-family="JetBrains Mono, monospace" opacity="0.3">tick_id · config_hash · bitmap_set · balances</text>

  <!-- Oracle 2 -->
  <rect x="345" y="32" width="270" height="200" rx="12" fill="#0A0A0A" opacity="0.03" filter="url(#shadow)"/>
  <rect x="345" y="32" width="270" height="40" rx="12" fill="url(#darkGrad)"/>
  <rect x="345" y="56" width="270" height="16" fill="url(#darkGrad)"/>
  <text x="480" y="58" text-anchor="middle" fill="white" font-size="14" font-weight="600">Oracle 2</text>
  <text x="369" y="100" fill="#0A0A0A" font-size="11" opacity="0.5">1. Fetch prices from DN-2</text>
  <text x="369" y="122" fill="#0A0A0A" font-size="11" opacity="0.5">2. Resolve outcomes</text>
  <text x="369" y="144" fill="#0A0A0A" font-size="11" opacity="0.5">3. BLS sign message</text>
  <line x1="361" y1="160" x2="599" y2="160" stroke="#0A0A0A" opacity="0.08" stroke-width="1"/>
  <text x="369" y="180" fill="#0A0A0A" font-size="9" font-family="JetBrains Mono, monospace" opacity="0.3">tick_id · config_hash · bitmap_set · balances</text>

  <!-- Oracle 3 -->
  <rect x="639" y="32" width="270" height="200" rx="12" fill="#0A0A0A" opacity="0.03" filter="url(#shadow)"/>
  <rect x="639" y="32" width="270" height="40" rx="12" fill="url(#darkGrad)"/>
  <rect x="639" y="56" width="270" height="16" fill="url(#darkGrad)"/>
  <text x="774" y="58" text-anchor="middle" fill="white" font-size="14" font-weight="600">Oracle 3</text>
  <text x="663" y="100" fill="#0A0A0A" font-size="11" opacity="0.5">1. Fetch prices from DN-3</text>
  <text x="663" y="122" fill="#0A0A0A" font-size="11" opacity="0.5">2. Resolve outcomes</text>
  <text x="663" y="144" fill="#0A0A0A" font-size="11" opacity="0.5">3. BLS sign message</text>
  <line x1="655" y1="160" x2="893" y2="160" stroke="#0A0A0A" opacity="0.08" stroke-width="1"/>
  <text x="663" y="180" fill="#0A0A0A" font-size="9" font-family="JetBrains Mono, monospace" opacity="0.3">tick_id · config_hash · bitmap_set · balances</text>

  <!-- ===== Three curved lines converging to center ===== -->
  <path d="M 186 232 Q 186 290, 310 320" stroke="#0A0A0A" stroke-width="0.75" opacity="0.12" fill="none"/>
  <circle cx="186" cy="232" r="3" fill="#0A0A0A" opacity="0.2"/>

  <path d="M 480 232 Q 480 280, 480 316" stroke="#0A0A0A" stroke-width="0.75" opacity="0.12" fill="none"/>
  <circle cx="480" cy="232" r="3" fill="#0A0A0A" opacity="0.2"/>

  <path d="M 774 232 Q 774 290, 650 320" stroke="#0A0A0A" stroke-width="0.75" opacity="0.12" fill="none"/>
  <circle cx="774" cy="232" r="3" fill="#0A0A0A" opacity="0.2"/>

  <!-- ===== CENTER: BLS Signature Aggregation (dark) ===== -->
  <rect x="290" y="316" width="380" height="110" rx="14" fill="url(#darkGrad)" filter="url(#shadow)"/>
  <!-- Decorative circle inside -->
  <circle cx="600" cy="340" r="150" fill="white" opacity="0.02"/>

  <text x="480" y="356" text-anchor="middle" fill="white" font-size="18" font-weight="700">BLS Signature Aggregation</text>
  <text x="480" y="382" text-anchor="middle" fill="white" font-size="11" opacity="0.5">2/3+ identical = valid</text>
  <text x="480" y="402" text-anchor="middle" fill="white" font-size="11" opacity="0.35">Any mismatch = rejected</text>

  <!-- ===== Curved line down to Vision.sol ===== -->
  <path d="M 480 426 Q 480 456, 480 472" stroke="#0A0A0A" stroke-width="0.75" opacity="0.12" fill="none"/>
  <circle cx="480" cy="426" r="3" fill="#0A0A0A" opacity="0.2"/>
  <circle cx="480" cy="472" r="3" fill="#0A0A0A" opacity="0.2"/>

  <!-- ===== BOTTOM: Vision.sol (L3) ===== -->
  <rect x="310" y="474" width="340" height="80" rx="12" fill="#0A0A0A" opacity="0.03" filter="url(#shadow)"/>
  <text x="480" y="506" text-anchor="middle" fill="#0A0A0A" font-size="14" font-weight="600">Vision.sol (L3)</text>
  <text x="480" y="528" text-anchor="middle" fill="#0A0A0A" font-size="11" opacity="0.5">Verify against OracleRegistry aggregated pubkey</text>

  <!-- ===== RIGHT FLOATING PANEL: Protected by BLS ===== -->
  <rect x="720" y="300" width="200" height="172" rx="12" fill="#0A0A0A" opacity="0.03" filter="url(#shadow)"/>
  <!-- Emerald left border -->
  <rect x="720" y="300" width="3" height="172" rx="1.5" fill="#10B981"/>

  <text x="744" y="330" fill="#0A0A0A" font-size="12" font-weight="600">Protected by BLS</text>
  <line x1="744" y1="342" x2="900" y2="342" stroke="#0A0A0A" opacity="0.08" stroke-width="1"/>

  <circle cx="752" cy="366" r="3" fill="#10B981"/>
  <text x="766" y="370" fill="#0A0A0A" font-size="11" opacity="0.5">Tick resolution</text>

  <circle cx="752" cy="394" r="3" fill="#10B981"/>
  <text x="766" y="398" fill="#0A0A0A" font-size="11" opacity="0.5">Balance proofs</text>

  <circle cx="752" cy="422" r="3" fill="#10B981"/>
  <text x="766" y="426" fill="#0A0A0A" font-size="11" opacity="0.5">Config updates</text>

  <circle cx="752" cy="450" r="3" fill="#10B981"/>
  <text x="766" y="454" fill="#0A0A0A" font-size="11" opacity="0.5">Batch creation</text>

</svg>