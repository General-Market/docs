<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1F1F1F"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-opacity="0.03"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="560" fill="#FFFFFF"/>

  <!-- Outer dark container -->
  <rect x="30" y="20" width="900" height="520" rx="16" fill="url(#darkGrad)"/>

  <!-- Decorative large circle top-right -->
  <circle cx="820" cy="80" r="200" fill="white" opacity="0.015"/>

  <!-- Header -->
  <text x="480" y="58" text-anchor="middle" fill="white" font-size="22" font-weight="700" letter-spacing="-0.5">L3 ORBIT CHAIN</text>
  <text x="480" y="78" text-anchor="middle" fill="white" font-size="11" opacity="0.4">111222333</text>

  <!-- ===== Vision.sol — centered card ===== -->
  <rect x="180" y="100" width="600" height="220" rx="12" fill="white" opacity="0.08"/>

  <!-- Vision.sol title -->
  <text x="480" y="132" text-anchor="middle" fill="white" font-size="16" font-weight="700">Vision.sol</text>

  <!-- Thin separator -->
  <line x1="210" y1="146" x2="750" y2="146" stroke="white" opacity="0.1" stroke-width="1"/>

  <!-- Left column: STORAGE -->
  <text x="230" y="174" fill="white" font-size="10" font-weight="600" letter-spacing="2" opacity="0.4">STORAGE</text>
  <text x="230" y="198" fill="white" font-size="11" opacity="0.6">Batch Registry</text>
  <text x="230" y="220" fill="white" font-size="11" opacity="0.6">Bitmap Commits</text>
  <text x="230" y="242" fill="white" font-size="11" opacity="0.6">Config Hashes</text>
  <text x="230" y="264" fill="white" font-size="11" opacity="0.6">Tick State</text>

  <!-- Vertical divider -->
  <line x1="480" y1="158" x2="480" y2="308" stroke="white" opacity="0.1" stroke-width="1"/>

  <!-- Right column: FUNCTIONS -->
  <text x="520" y="174" fill="white" font-size="10" font-weight="600" letter-spacing="2" opacity="0.4">FUNCTIONS</text>
  <text x="520" y="198" fill="white" font-size="10" font-family="JetBrains Mono, monospace" opacity="0.5">createBatch()</text>
  <text x="520" y="220" fill="white" font-size="10" font-family="JetBrains Mono, monospace" opacity="0.5">joinBatch()</text>
  <text x="520" y="242" fill="white" font-size="10" font-family="JetBrains Mono, monospace" opacity="0.5">updateBitmap()</text>
  <text x="520" y="264" fill="white" font-size="10" font-family="JetBrains Mono, monospace" opacity="0.5">claimRewards()</text>
  <text x="520" y="286" fill="white" font-size="10" font-family="JetBrains Mono, monospace" opacity="0.5">updateBatchConfig()</text>

  <!-- ===== Bottom row: two cards side by side ===== -->

  <!-- VisionReserve -->
  <rect x="180" y="368" width="260" height="140" rx="12" fill="white" opacity="0.08"/>
  <text x="310" y="400" text-anchor="middle" fill="white" font-size="14" font-weight="600">VisionReserve</text>
  <text x="310" y="424" text-anchor="middle" fill="white" font-size="12" font-weight="600">USDC Custody</text>
  <text x="310" y="450" text-anchor="middle" fill="white" font-size="10" font-family="JetBrains Mono, monospace" opacity="0.5">deposit() · withdraw()</text>
  <text x="310" y="478" text-anchor="middle" fill="white" font-size="10" font-style="italic" opacity="0.3">Only Vision.sol can call</text>

  <!-- OracleRegistry -->
  <rect x="500" y="368" width="260" height="140" rx="12" fill="white" opacity="0.08"/>
  <text x="630" y="400" text-anchor="middle" fill="white" font-size="14" font-weight="600">OracleRegistry</text>
  <text x="630" y="424" text-anchor="middle" fill="white" font-size="12" font-weight="600">BLS Public Keys</text>
  <text x="630" y="450" text-anchor="middle" fill="white" font-size="11" opacity="0.5">Aggregated Pubkey</text>
  <text x="630" y="478" text-anchor="middle" fill="white" font-size="13" font-weight="700">Threshold: &#x2308;2n/3&#x2309;</text>

  <!-- ===== Curved line: Vision.sol -> VisionReserve ===== -->
  <path d="M 360 320 Q 340 350, 310 366" stroke="white" stroke-width="0.75" opacity="0.2" fill="none"/>
  <circle cx="360" cy="320" r="3" fill="white" opacity="0.35"/>
  <circle cx="310" cy="366" r="3" fill="white" opacity="0.35"/>
  <text x="312" y="346" text-anchor="middle" fill="white" font-size="10" opacity="0.35">funds</text>

  <!-- ===== Curved line: Vision.sol -> OracleRegistry ===== -->
  <path d="M 580 320 Q 610 350, 630 366" stroke="white" stroke-width="0.75" opacity="0.2" fill="none"/>
  <circle cx="580" cy="320" r="3" fill="white" opacity="0.35"/>
  <circle cx="630" cy="366" r="3" fill="white" opacity="0.35"/>
  <text x="628" y="346" text-anchor="middle" fill="white" font-size="10" opacity="0.35">verify BLS</text>

</svg>