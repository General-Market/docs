  <text x="832" y="620" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" opacity="0.5">Resolver</text>
  <text x="832" y="640" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" opacity="0.5">Config Orchestrator</text>
  <text x="832" y="660" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" opacity="0.5">BLS Signer</text>
  <text x="832" y="680" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" opacity="0.5">Chain Listener</text>

