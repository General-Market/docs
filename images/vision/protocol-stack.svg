  <!-- 60px gap. Two thin lines with endpoint dots -->
  <!-- Left line -->
  <circle cx="310" cy="168" r="3" fill="#0A0A0A" opacity="0.2"/>
  <line x1="310" y1="171" x2="310" y2="228" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="310" cy="228" r="3" fill="#0A0A0A" opacity="0.2"/>

