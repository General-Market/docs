  <rect x="712" y="734" width="3" height="24" rx="1.5" fill="#10B981"/>
  <text x="832" y="744" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">Data Node 3</text>
  <text x="832" y="760" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="400" fill="#FFFFFF" opacity="0.4">98 sources</text>

  <!-- 60px gap after dark section -->
