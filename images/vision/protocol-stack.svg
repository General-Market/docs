<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="1100" viewBox="0 0 1060 1100">
  <defs>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1F1F1F"/>
    </linearGradient>
    <filter id="subtleShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.03"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1060" height="1100" fill="#FFFFFF"/>

  <!-- ============================================ -->
  <!-- USERS / BOTS label -->
  <!-- ============================================ -->
  <text x="530" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#0A0A0A" opacity="0.3" letter-spacing="2">USERS / BOTS</text>

  <!-- Small circle endpoint -->
  <circle cx="530" cy="52" r="3" fill="#0A0A0A" opacity="0.2"/>

  <!-- Thin line down -->
  <line x1="530" y1="55" x2="530" y2="75" stroke="#0A0A0A" stroke-opacity="0.1" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- FRONTEND box -->
  <!-- ============================================ -->
  <rect x="60" y="80" width="940" height="88" rx="12" fill="#0A0A0A" fill-opacity="0.03" filter="url(#subtleShadow)"/>
  <text x="88" y="116" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#0A0A0A" letter-spacing="-0.5">FRONTEND</text>
