  <line x1="232" y1="826" x2="232" y2="890" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="532" y1="826" x2="532" y2="890" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="832" y1="826" x2="832" y2="890" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4,4"/>

