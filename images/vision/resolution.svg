<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" width="980" height="720" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1F1F1F"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-opacity="0.03"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="980" height="720" fill="#FFF"/>

  <!-- ========== ORACLE 1 ========== -->
  <!-- Card body (white, rx=12 bottom) -->
  <rect x="46" y="20" width="280" height="290" rx="12" fill="#FFF" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1" filter="url(#shadow)"/>
  <!-- Dark gradient header strip -->
  <rect x="46" y="20" width="280" height="40" rx="12" fill="url(#darkGrad)"/>
  <rect x="46" y="48" width="280" height="12" fill="url(#darkGrad)"/>
  <text x="186" y="46" text-anchor="middle" font-size="14" font-weight="600" fill="#FFF">Oracle 1</text>

  <!-- Step 1 -->
  <circle cx="72" cy="82" r="3" fill="#0A0A0A" fill-opacity="0.15"/>
  <text x="84" y="86" font-size="11" font-weight="600" fill="#0A0A0A">1. Fetch prices</text>
  <text x="84" y="99" font-size="10" fill="#0A0A0A" fill-opacity="0.3">from DN-1</text>
  <line x1="186" y1="106" x2="186" y2="116" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Step 2 -->
  <circle cx="72" cy="126" r="3" fill="#0A0A0A" fill-opacity="0.15"/>
  <text x="84" y="130" font-size="11" font-weight="600" fill="#0A0A0A">2. Decode bitmaps</text>
  <text x="84" y="143" font-size="10" fill="#0A0A0A" fill-opacity="0.3">using stored config_hash</text>
  <line x1="186" y1="150" x2="186" y2="160" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Step 3 -->
  <circle cx="72" cy="170" r="3" fill="#0A0A0A" fill-opacity="0.15"/>
  <text x="84" y="174" font-size="11" font-weight="600" fill="#0A0A0A">3. Compare to price moves</text>
  <line x1="186" y1="182" x2="186" y2="192" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Step 4 -->
  <circle cx="72" cy="202" r="3" fill="#0A0A0A" fill-opacity="0.15"/>
  <text x="84" y="206" font-size="11" font-weight="600" fill="#0A0A0A">4. Parimutuel matching</text>
  <text x="84" y="219" font-size="10" fill="#0A0A0A" fill-opacity="0.3">flat stakes</text>
  <line x1="186" y1="226" x2="186" y2="236" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Step 5 (dark pill) -->
  <rect x="66" y="244" width="240" height="30" rx="14" fill="url(#darkGrad)"/>
  <text x="186" y="264" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">5. BLS sign result</text>

  <!-- ========== ORACLE 2 ========== -->
  <rect x="350" y="20" width="280" height="290" rx="12" fill="#FFF" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1" filter="url(#shadow)"/>
  <rect x="350" y="20" width="280" height="40" rx="12" fill="url(#darkGrad)"/>
  <rect x="350" y="48" width="280" height="12" fill="url(#darkGrad)"/>
  <text x="490" y="46" text-anchor="middle" font-size="14" font-weight="600" fill="#FFF">Oracle 2</text>

  <circle cx="376" cy="82" r="3" fill="#0A0A0A" fill-opacity="0.15"/>
  <text x="388" y="86" font-size="11" font-weight="600" fill="#0A0A0A">1. Fetch prices</text>
  <text x="388" y="99" font-size="10" fill="#0A0A0A" fill-opacity="0.3">from DN-2</text>
  <line x1="490" y1="106" x2="490" y2="116" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>

  <circle cx="376" cy="126" r="3" fill="#0A0A0A" fill-opacity="0.15"/>
  <text x="388" y="130" font-size="11" font-weight="600" fill="#0A0A0A">2. Decode bitmaps</text>
  <text x="388" y="143" font-size="10" fill="#0A0A0A" fill-opacity="0.3">using stored config_hash</text>
  <line x1="490" y1="150" x2="490" y2="160" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>

  <circle cx="376" cy="170" r="3" fill="#0A0A0A" fill-opacity="0.15"/>
  <text x="388" y="174" font-size="11" font-weight="600" fill="#0A0A0A">3. Compare to price moves</text>
  <line x1="490" y1="182" x2="490" y2="192" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>

  <circle cx="376" cy="202" r="3" fill="#0A0A0A" fill-opacity="0.15"/>
  <text x="388" y="206" font-size="11" font-weight="600" fill="#0A0A0A">4. Parimutuel matching</text>
  <text x="388" y="219" font-size="10" fill="#0A0A0A" fill-opacity="0.3">flat stakes</text>
  <line x1="490" y1="226" x2="490" y2="236" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>

  <rect x="370" y="244" width="240" height="30" rx="14" fill="url(#darkGrad)"/>
  <text x="490" y="264" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">5. BLS sign result</text>

  <!-- ========== ORACLE 3 ========== -->
  <rect x="654" y="20" width="280" height="290" rx="12" fill="#FFF" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1" filter="url(#shadow)"/>
  <rect x="654" y="20" width="280" height="40" rx="12" fill="url(#darkGrad)"/>
  <rect x="654" y="48" width="280" height="12" fill="url(#darkGrad)"/>
  <text x="794" y="46" text-anchor="middle" font-size="14" font-weight="600" fill="#FFF">Oracle 3</text>

  <circle cx="680" cy="82" r="3" fill="#0A0A0A" fill-opacity="0.15"/>
  <text x="692" y="86" font-size="11" font-weight="600" fill="#0A0A0A">1. Fetch prices</text>
  <text x="692" y="99" font-size="10" fill="#0A0A0A" fill-opacity="0.3">from DN-3</text>
  <line x1="794" y1="106" x2="794" y2="116" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>

  <circle cx="680" cy="126" r="3" fill="#0A0A0A" fill-opacity="0.15"/>
  <text x="692" y="130" font-size="11" font-weight="600" fill="#0A0A0A">2. Decode bitmaps</text>
  <text x="692" y="143" font-size="10" fill="#0A0A0A" fill-opacity="0.3">using stored config_hash</text>
  <line x1="794" y1="150" x2="794" y2="160" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>

  <circle cx="680" cy="170" r="3" fill="#0A0A0A" fill-opacity="0.15"/>
  <text x="692" y="174" font-size="11" font-weight="600" fill="#0A0A0A">3. Compare to price moves</text>
  <line x1="794" y1="182" x2="794" y2="192" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>

  <circle cx="680" cy="202" r="3" fill="#0A0A0A" fill-opacity="0.15"/>
  <text x="692" y="206" font-size="11" font-weight="600" fill="#0A0A0A">4. Parimutuel matching</text>
  <text x="692" y="219" font-size="10" fill="#0A0A0A" fill-opacity="0.3">flat stakes</text>
  <line x1="794" y1="226" x2="794" y2="236" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1"/>

  <rect x="674" y="244" width="240" height="30" rx="14" fill="url(#darkGrad)"/>
  <text x="794" y="264" text-anchor="middle" font-size="11" font-weight="600" fill="#FFF">5. BLS sign result</text>

  <!-- ========== CONVERGENCE CURVES ========== -->
  <!-- Oracle 1: curve from bottom of step 5 down and right -->
  <path d="M186,274 C186,310 186,320 290,340" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1" fill="none"/>
  <circle cx="186" cy="274" r="3" fill="#0A0A0A" fill-opacity="0.12"/>

  <!-- Oracle 2: straight down -->
  <path d="M490,274 L490,340" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1" fill="none"/>
  <circle cx="490" cy="274" r="3" fill="#0A0A0A" fill-opacity="0.12"/>

  <!-- Oracle 3: curve from bottom of step 5 down and left -->
  <path d="M794,274 C794,310 794,320 690,340" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1" fill="none"/>
  <circle cx="794" cy="274" r="3" fill="#0A0A0A" fill-opacity="0.12"/>

  <!-- Junction circles at convergence -->
  <circle cx="290" cy="340" r="3" fill="#0A0A0A" fill-opacity="0.12"/>
  <circle cx="490" cy="340" r="3" fill="#0A0A0A" fill-opacity="0.12"/>
  <circle cx="690" cy="340" r="3" fill="#0A0A0A" fill-opacity="0.12"/>

  <!-- Lines into BLS box -->
  <line x1="290" y1="340" x2="290" y2="360" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="490" y1="340" x2="490" y2="360" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="690" y1="340" x2="690" y2="360" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1"/>

  <!-- ========== BLS AGGREGATION — DARK SECTION ========== -->
  <rect x="290" y="360" width="400" height="80" rx="14" fill="url(#darkGrad)" filter="url(#shadow)"/>
  <!-- Decorative circle -->
  <circle cx="490" cy="400" r="120" fill="#FFF" fill-opacity="0.02"/>
  <text x="490" y="394" text-anchor="middle" font-size="20" font-weight="700" fill="#FFF">BLS Aggregation</text>
  <text x="490" y="416" text-anchor="middle" font-size="11" fill="#FFF" fill-opacity="0.45">All 3 must produce identical results</text>

  <!-- Curved line down with dot -->
  <path d="M490,440 C490,450 490,458 490,468" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="1" fill="none"/>
  <circle cx="490" cy="468" r="3" fill="#0A0A0A" fill-opacity="0.12"/>

  <!-- ========== TICK BOUNDARY ========== -->
  <rect x="220" y="478" width="540" height="110" rx="12" fill="#0A0A0A" fill-opacity="0.03" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1" filter="url(#shadow)"/>
  <text x="490" y="500" text-anchor="middle" font-size="10" font-weight="600" fill="#0A0A0A" fill-opacity="0.4" letter-spacing="2">TICK BOUNDARY</text>
  <text x="490" y="518" text-anchor="middle" font-size="14" font-weight="600" fill="#0A0A0A">Atomic Execution</text>

  <!-- Item 1 -->
  <circle cx="276" cy="544" r="3.5" fill="#10B981"/>
  <text x="290" y="548" font-size="11" fill="#0A0A0A" fill-opacity="0.5">Publish results</text>

  <!-- Item 2 -->
  <circle cx="420" cy="544" r="3.5" fill="#10B981"/>
  <text x="434" y="548" font-size="11" fill="#0A0A0A" fill-opacity="0.5">Bitmap flip: active ← pending, pending ← cleared</text>

  <!-- Item 3 -->
  <circle cx="276" cy="568" r="3.5" fill="#10B981"/>
  <text x="290" y="572" font-size="11" fill="#0A0A0A" fill-opacity="0.5">Config promotion (if pending)</text>

  <!-- ========== 40px GAP ========== -->

  <!-- ========== PARIMUTUEL SETTLEMENT ========== -->
  <rect x="220" y="628" width="540" height="72" rx="14" fill="#0A0A0A" fill-opacity="0.03" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="1" filter="url(#shadow)"/>
  <text x="490" y="656" text-anchor="middle" font-size="14" font-weight="600" fill="#0A0A0A">Parimutuel Settlement</text>
  <text x="490" y="676" text-anchor="middle" font-size="11" fill="#0A0A0A" fill-opacity="0.5">Winners split losers' stakes proportionally · 0.05% fee on profits only · No multiplier</text>
</svg>